<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>彩噴數位防呆點檢系統</title>
</head>
<body>

<div class="container">
    <h1>🖨️ 彩噴產線數位防呆點檢</h1>
    
    <div class="operator-container" style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
        <label for="operatorSelect" style="font-weight: bold; font-size: 16px;">👤 當班操作員：</label>
        <select id="operatorSelect" style="padding: 6px 12px; font-size: 15px; border-radius: 4px; border: 1px solid #ccc;">
            <option value="未選取">-- 請選擇人員 --</option>
            <option value="操作員A">操作員 A</option>
            <option value="操作員B">操作員 B</option>
            <option value="操作員C">操作員 C</option>
        </select>
    </div>
    
    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('prePrint')">印前點檢</button>
        <button class="tab-btn" onclick="switchTab('raiseHead')">抬高車頭點檢</button>
    </div>

    <div class="checklist" id="checklistContainer"></div>

    <div class="control-panel">
        <div class="status-bar" id="statusBar">請完成所有點檢項目</div>
        <div class="btn-group">
            <button class="reset-btn" onclick="resetChecklist()">重置 ↺</button>
        </div>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
